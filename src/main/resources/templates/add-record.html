<!DOCTYPE html>
<html>
<head>
    <title>Add Record</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h2>Add Financial Record</h2>

<form id="recordForm">
    <input class="form-control mb-2" type="number" placeholder="Amount" id="amount" required>
    <select class="form-control mb-2" id="type">
        <option value="INCOME">Income</option>
        <option value="EXPENSE">Expense</option>
    </select>
    <input class="form-control mb-2" type="text" placeholder="Category" id="category" required>
    <input class="form-control mb-2" type="date" id="date" required>
    <input class="form-control mb-2" type="text" placeholder="Notes" id="notes">
    <button class="btn btn-success">Save</button>
</form>

<script>
const username = localStorage.getItem("username"); // store logged-in username after login

document.getElementById("recordForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const token = localStorage.getItem("token"); // JWT from login
    if (!token) {
        alert("Please login first");
        window.location.href = "/login";
        return;
    }

    const data = {
        amount: parseFloat(document.getElementById("amount").value),
        type: document.getElementById("type").value,
        category: document.getElementById("category").value,
        date: document.getElementById("date").value,
        notes: document.getElementById("notes").value
    };

    fetch(`http://localhost:8082/api/records`, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify(data)
    })
    .then(res => {
        if (!res.ok) return res.json().then(err => { throw new Error(err.message || "Save failed"); });
        return res.json();
    })
    .then(() => {
        alert("Record Saved!");
        window.location.href = "/records.html";
    })
    .catch(err => alert(err.message));
});




</script>

</body>
</html>
