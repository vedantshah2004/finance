<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark p-3">
    <span class="navbar-brand">Finance Tracker</span>
    <a href="/logout" class="btn btn-danger">Logout</a>
</nav>

<div class="container mt-4">
    <h2>Dashboard</h2>

    <div class="row mt-4">
        <div class="col-md-4">
            <div class="card bg-success text-white p-3">
                <h4>Income</h4>
                <h3 id="income">0</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card bg-danger text-white p-3">
                <h4>Expense</h4>
                <h3 id="expense">0</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card bg-primary text-white p-3">
                <h4>Balance</h4>
                <h3 id="balance">0</h3>
            </div>
        </div>
    </div>

    <div class="mt-4">
        <a href="/add" class="btn btn-success">Add Record</a>
        <a href="/records" class="btn btn-info">View Records</a>
    </div>
</div>

<script>
fetch('/dashboard/summary')
.then(res => res.json())
.then(data => {
    document.getElementById('income').innerText = data.income;
    document.getElementById('expense').innerText = data.expense;
    document.getElementById('balance').innerText = data.balance;
});
</script>

</body>
</html>
