<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<div class="col-md-4 offset-md-4">
    <h2 class="text-center">Login</h2>

    <form id="loginForm">
        <input class="form-control mb-3" type="text" placeholder="Username" id="username" required>
        <small class="text-danger" id="usernameError"></small>

        <input class="form-control mb-3" type="password" placeholder="Password" id="password" required>
        <small class="text-danger" id="passwordError"></small>

        <button class="btn btn-primary w-100">Login</button>
    </form>

    <p class="text-center mt-3">
        Don't have an account?
        <a href="/signup">Sign up</a>
    </p>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();

    // Clear previous errors
    document.getElementById("usernameError").innerText = '';
    document.getElementById("passwordError").innerText = '';

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    let valid = true;

    if(username === "") {
        document.getElementById("usernameError").innerText = "Username is required";
        valid = false;
    }
    if(password === "") {
        document.getElementById("passwordError").innerText = "Password is required";
        valid = false;
    }
    if(!valid) return;

    fetch('/auth/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ username, password })
    })
    .then(res => {
        if(!res.ok) throw new Error("Invalid credentials");
        return res.json(); // backend should return { "token": "jwt_token_here" }
    })
    .then(data => {
        localStorage.setItem("token", data.token); // store JWT
        alert("Login Successful!");
        window.location.href = "/home"; // redirect to dashboard
    })
    .catch(err => alert(err.message));
});
</script>

</body>
</html>
