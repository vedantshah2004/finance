<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<div class="col-md-4 offset-md-4">
    <h2 class="text-center">Sign Up</h2>

    <form id="signupForm">
    <input class="form-control mb-3" type="text" placeholder="Username" id="username" required minlength="3">
    <small class="text-danger" id="usernameError"></small>

    <input class="form-control mb-3" type="password" placeholder="Password" id="password" required minlength="5">
    <small class="text-danger" id="passwordError"></small>

    <button class="btn btn-success w-100">Register</button>
</form>

<script>
document.getElementById("signupForm").addEventListener("submit", function(e) {
    e.preventDefault();

    document.getElementById("usernameError").innerText = '';
    document.getElementById("passwordError").innerText = '';

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    let valid = true;

    if(username.length < 3) {
        document.getElementById("usernameError").innerText = "Username must be at least 3 characters";
        valid = false;
    }
    if(password.length < 5) {
        document.getElementById("passwordError").innerText = "Password must be at least 5 characters";
        valid = false;
    }
    if(!valid) return;

    fetch('/auth/register', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({username, password})
    })
    .then(res => {
        if(!res.ok) return res.json().then(err => { throw new Error(err.message || "Signup failed"); });
        return res.json();
    })
    .then(() => {
        alert("Registration Successful!");
        window.location.href = "/login";
    })
    .catch(err => alert(err.message));
});
</script>

</body>
</html>
